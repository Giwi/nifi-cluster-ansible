---
haproxy_stats_port: 8404
haproxy_nifi_backend_port: 8443
haproxy_frontend_port: 8443
haproxy_ssl_cert: "/etc/haproxy/certs/nifi.pem"
# Set to true if HAProxy should terminate SSL (requires certificate)
haproxy_ssl_termination: false
# Path to provided certificate file (PEM format with cert+key)
haproxy_provided_cert: "nifi.pem"
# HAProxy stats authentication
haproxy_stats_user: "admin"
haproxy_stats_password: "{{ vault_haproxy_stats_password }}"
