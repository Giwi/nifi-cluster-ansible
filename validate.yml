---
- name: Validate ZooKeeper Cluster
  hosts: zookeeper
  become: yes
  tasks:
    - name: Check ZooKeeper service status
      shell: podman ps --filter name=zookeeper
      register: zk_status
      failed_when: "'Up' not in zk_status.stdout"

- name: Validate NiFi Cluster
  hosts: nifi
  become: yes
  tasks:
    - name: Check NiFi service status
      shell: podman ps --filter name=nifi
      register: nifi_status
      failed_when: "'Up' not in nifi_status.stdout"

- name: Validate HAProxy
  hosts: haproxy
  become: yes
  tasks:
    - name: Check HAProxy service status
      shell: podman ps --filter name=haproxy
      register: haproxy_status
      failed_when: "'Up' not in haproxy_status.stdout"

    - name: Check HAProxy stats page
      uri:
        url: http://localhost:8404/stats
        user: "{{ haproxy_stats_user }}"
        password: "{{ vault_haproxy_stats_password }}"
        status_code: 200
