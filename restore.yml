---
- name: Restore ZooKeeper from backup
  hosts: zookeeper
  become: yes
  vars:
    backup_file: "{{ restore_file | default('') }}"
  tasks:
    - name: Fail if backup file not specified
      fail:
        msg: >-
          Specity backup file with:
          -e restore_file=/opt/backups/zookeeper/backup.tar.gz
      when: backup_file == ""

    - name: Stop ZooKeeper container
      command: podman stop zookeeper
      register: stop_result
      failed_when: >-
        stop_result.rc != 0 and
        "no such container" not in stop_result.stderr

    - name: Extract backup to data directory
      unarchive:
        src: "{{ backup_file }}"
        dest: "{{ zookeeper_data_dir }}"
        remote_src: yes
        owner: zookeeper
        group: zookeeper

    - name: Start ZooKeeper container
      command: podman start zookeeper
      register: start_result
      failed_when: start_result.rc != 0

