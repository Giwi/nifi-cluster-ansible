---
- name: Install Podman and UFW
  apt:
    name:
      - podman
      - ufw
    state: present
    update_cache: yes

- name: Set UFW default policy
  ufw:
    policy: deny
    direction: incoming
    log: yes

- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HAProxy frontend from admin network
  ufw:
    rule: allow
    port: "{{ haproxy_frontend_port }}"
    proto: tcp
    from_ip: "{{ admin_network | default('any') }}"

- name: Allow HAProxy stats from admin network
  ufw:
    rule: allow
    port: "{{ haproxy_stats_port }}"
    proto: tcp
    from_ip: "{{ admin_network | default('127.0.0.1') }}"

- name: Enable UFW
  ufw:
    state: enabled

# Check if HAProxy container exists
- name: Check if HAProxy container exists
  command: podman inspect haproxy
  register: haproxy_container_exists
  failed_when: false
  changed_when: false

- name: Create HAProxy configuration directory
  file:
    path: /etc/haproxy
    state: directory
    mode: '0755'

- name: Deploy HAProxy configuration
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: '0644'
  notify: restart haproxy

- name: Create SSL certificate directory
  file:
    path: /etc/haproxy/certs
    state: directory
    mode: '0700'
  when: haproxy_ssl_termination

- name: Copy provided SSL certificate for HAProxy
  copy:
    src: "{{ playbook_dir }}/files/{{ haproxy_provided_cert }}"
    dest: "{{ haproxy_ssl_cert }}"
    mode: '0600'
  when: haproxy_ssl_termination
  notify: restart haproxy

- name: Stop existing HAProxy container if running
  command: podman stop haproxy
  register: stop_result
  failed_when: stop_result.rc != 0 and "no such container" not in stop_result.stderr
  changed_when: stop_result.rc == 0
  when: haproxy_container_exists.rc == 0

- name: Remove existing HAProxy container if exists
  command: podman rm haproxy
  register: rm_result
  failed_when: rm_result.rc != 0 and "no such container" not in rm_result.stderr
  changed_when: rm_result.rc == 0
  when: haproxy_container_exists.rc == 0

- name: Deploy HAProxy container
  command: >
    podman run -d
    --name haproxy
    -p {{ haproxy_frontend_port }}:{{ haproxy_frontend_port }}
    -p {{ haproxy_stats_port }}:{{ haproxy_stats_port }}
    -v /etc/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    {% if haproxy_ssl_termination %}
    -v /etc/haproxy/certs:/etc/haproxy/certs:ro
    {% endif %}
    --restart always
    --memory=512m
    --cpus=0.5
    haproxy:2.8
  register: podman_run
  changed_when: podman_run.rc == 0
  when: not haproxy_container_exists.stat.exists or haproxy_config_changed

- name: Wait for HAProxy to start
  wait_for:
    host: localhost
    port: "{{ haproxy_frontend_port }}"
    delay: 5
    timeout: 30

- name: Install logrotate
  apt:
    name: logrotate
    state: present

- name: Configure logrotate for HAProxy
  template:
    src: logrotate.j2
    dest: /etc/logrotate.d/haproxy
    mode: '0644'
