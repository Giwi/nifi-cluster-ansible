---
- name: Schedule secret rotation cron
  cron:
    name: "NiFi secret rotation"
    minute: "0"
    hour: "2"
    weekday: "0"
    job: >-
      {{ playbook_dir }}/scripts/rotate-nifi-secrets.sh
    state: present

- name: Create secret rotation script
  copy:
    content: |
      #!/bin/bash
      set -e
      NEW_KEY=$(openssl rand -base64 32)
      echo "$NEW_KEY" > /opt/nifi/secrets/sensitive-props-key.new
      chmod 600 /opt/nifi/secrets/sensitive-props-key.new
      # Update vault with new key
       ansible-vault encrypt_string "$NEW_KEY" \
         --name 'vault_nifi_sensitive_props_key' > /tmp/new_key.yml
      # Restart NiFi to pick up new key
      podman restart nifi
      # Cleanup
      rm -f /opt/nifi/secrets/sensitive-props-key.new /tmp/new_key.yml
    dest: /opt/nifi/scripts/rotate-nifi-secrets.sh
    mode: '0700'
  when: nifi_use_keycloak

- name: Create secret directory
  file:
    path: /opt/nifi/secrets
    state: directory
    mode: '0700'
  when: nifi_use_keycloak
