---
- name: Create backup directory
  file:
    path: /opt/backups/nifi
    state: directory
    mode: '0755'

- name: Schedule NiFi backup cron
  cron:
    name: "NiFi backup"
    minute: "0"
    hour: "3"
    job: "tar -czf /opt/backups/nifi/nifi-backup-$(date +\\%Y\\%m\\%d).tar.gz /opt/nifi/data"
    state: present

- name: Schedule old backup cleanup cron
  cron:
    name: "Clean old NiFi backups"
    minute: "30"
    hour: "3"
    job: "find /opt/backups/nifi -name '*.tar.gz' -mtime +7 -delete"
    state: present

- name: Backup NiFi flows
  archive:
    path: /opt/nifi/data
    dest: "/opt/backups/nifi/nifi-flows-backup-{{ ansible_date_time.iso8601 }}.tar.gz"
    format: gz
  when: run_backup | default(false)
  tags: backup
