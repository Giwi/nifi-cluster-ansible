---
- name: Install Podman and UFW
  apt:
    name:
      - podman
      - podman-docker
      - ufw
      - logrotate
    state: present
    update_cache: true

- name: Set UFW default policy
  ufw:
    policy: deny
    direction: incoming
    log: true

- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow NiFi HTTPS from HAProxy
  ufw:
    rule: allow
    port: "{{ nifi_web_https_port }}"
    proto: tcp
    from_ip: "{{ hostvars[item]['ansible_host'] }}"
  loop: "{{ groups['haproxy'] | default([]) }}"

- name: Allow NiFi HTTP from HAProxy
  ufw:
    rule: allow
    port: "{{ nifi_web_http_port }}"
    proto: tcp
    from_ip: "{{ hostvars[item]['ansible_host'] }}"
  loop: "{{ groups['haproxy'] | default([]) }}"
  when: not nifi_use_keycloak | default(false)

- name: Allow NiFi cluster communication
  ufw:
    rule: allow
    port: "{{ nifi_cluster_node_protocol_port }}"
    proto: tcp
    from_ip: "{{ hostvars[item]['ansible_host'] }}"
  loop: "{{ groups['nifi'] | default([]) }}"
  when: item != inventory_hostname

- name: Allow ZooKeeper client port to NiFi
  ufw:
    rule: allow
    port: "{{ zookeeper_client_port }}"
    proto: tcp
    from_ip: "{{ hostvars[item]['ansible_host'] }}"
  loop: "{{ groups['zookeeper'] | default([]) }}"

- name: Enable UFW
  ufw:
    state: enabled

- name: Check if SSL files exist
  delegate_to: localhost
  stat:
    path: "{{ playbook_dir }}/files/{{ item }}"
  loop:
    - "{{ nifi_keystore_file }}"
    - "{{ nifi_truststore_file }}"
  register: ssl_files_check
  when: nifi_use_keycloak
  failed_when: >-
    nifi_use_keycloak and
    (ssl_files_check.results | selectattr('stat.exists',
    'equalto', false) | list | length > 0)

# Check if NiFi container exists
- name: Check if NiFi container exists
  command: podman inspect nifi
  register: nifi_container_exists
  failed_when: false
  changed_when: false

- name: Create nifi directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: root
  loop:
    - /opt/nifi/conf
    - /opt/nifi/data
    - /opt/nifi/logs
    - "{{ nifi_ssl_dir }}"

- name: Copy custom keystore
  copy:
    src: "{{ playbook_dir }}/files/{{ nifi_keystore_file }}"
    dest: "{{ nifi_keystore_path }}"
    mode: '0600'
  when: nifi_use_keycloak
  notify: restart nifi

- name: Copy custom truststore
  copy:
    src: "{{ playbook_dir }}/files/{{ nifi_truststore_file }}"
    dest: "{{ nifi_truststore_path }}"
    mode: '0600'
  when: nifi_use_keycloak
  notify: restart nifi

- name: Configure nifi.properties
  template:
    src: nifi.properties.j2
    dest: /opt/nifi/conf/nifi.properties
    mode: '0644'

- name: Configure login-identity-providers.xml
  template:
    src: login-identity-providers.xml.j2
    dest: /opt/nifi/conf/login-identity-providers.xml
    mode: '0644'

- name: Configure authorizers.xml
  template:
    src: authorizers.xml.j2
    dest: /opt/nifi/conf/authorizers.xml
    mode: '0644'

- name: Create Podman network for NiFi
  command: podman network create {{ nifi_docker_network }}
  args:
    creates: /etc/cni/net.d/{{ nifi_docker_network }}.conflist
  register: network_result
  failed_when: >-
    network_result.rc != 0 and
    "already exists" not in network_result.stderr

- name: Stop existing NiFi container if running
  command: podman stop nifi
  register: stop_result
  failed_when: >-
    stop_result.rc != 0 and
    "no such container" not in stop_result.stderr
  changed_when: stop_result.rc == 0
  when: nifi_container_exists.rc == 0

- name: Remove existing NiFi container if exists
  command: podman rm nifi
  register: rm_result
  failed_when: >-
    rm_result.rc != 0 and
    "no such container" not in rm_result.stderr
  changed_when: rm_result.rc == 0
  when: nifi_container_exists.rc == 0

- name: Deploy NiFi container
  command: >
    podman run -d --name nifi
    --network {{ nifi_docker_network }}
    -p {{ nifi_web_https_port }}:8443
    -p {{ nifi_web_http_port }}:8080
    -p {{ nifi_cluster_node_protocol_port }}:8082
    -v /opt/nifi/conf/nifi.properties:/opt/nifi/nifi-current/conf/
      nifi.properties:ro
    -v /opt/nifi/conf/login-identity-providers.xml:/opt/nifi/
      nifi-current/conf/login-identity-providers.xml:ro
    -v /opt/nifi/conf/authorizers.xml:/opt/nifi/nifi-current/conf/
      authorizers.xml:ro
    -v /opt/nifi/data:/opt/nifi/nifi-current/data
    -v /opt/nifi/logs:/opt/nifi/nifi-current/logs
    {% if nifi_use_keycloak %}
    -v {{ nifi_keystore_path }}:{{ nifi_keystore_path }}:ro
    -v {{ nifi_truststore_path }}:{{ nifi_truststore_path }}:ro
     {% endif %}
     -e NIFI_CLUSTER_IS_NODE=true
     -e NIFI_CLUSTER_NODE_ADDRESS={{ ansible_host }}
     -e NIFI_ZK_CONNECT_STRING={{ nifi_zookeeper_connect_string }}
     {% if nifi_use_keycloak %}
     -e NIFI_WEB_HTTPS_PORT={{ nifi_web_https_port }}
     {% else %}
     -e NIFI_WEB_HTTP_PORT={{ nifi_web_http_port }}
     {% endif %}
    --restart always
    --memory=4g
    --cpus=2.0
    --health-cmd="curl -f http://localhost:8080/nifi || true"
    --health-interval=30s
    --health-timeout=15s
    --health-retries=3
    apache/nifi:{{ nifi_version }}
  register: podman_run
  changed_when: podman_run.rc == 0
  when: not nifi_container_exists.stat.exists or nifi_config_changed

- name: Wait for NiFi to start
  wait_for:
    host: localhost
    port: "{{ nifi_web_http_port }}"
    delay: 30
    timeout: 120

- name: Install logrotate
  apt:
    name: logrotate
    state: present

- name: Configure logrotate for NiFi
  template:
    src: logrotate.j2
    dest: /etc/logrotate.d/nifi
    mode: '0644'

- name: Check NiFi health
  command: podman healthcheck run nifi
  register: health_check
  failed_when: false
  changed_when: false

# Backup tasks
- name: Backup NiFi flows
  include_tasks: backup.yml
  when: nifi_backup_enabled | default(false)
  tags: backup

# Secret rotation
- name: Setup secret rotation
  include_tasks: secret-rotation.yml
  when: nifi_use_keycloak
  tags: security
