---
- name: Install UFW firewall
  apt:
    name: ufw
    state: present
    update_cache: yes

- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow ZooKeeper client port from NiFi nodes
  ufw:
    rule: allow
    port: "{{ hostvars[item]['zookeeper_client_port'] | default('2181') }}"
    proto: tcp
    src: "{{ hostvars[item]['ansible_host'] }}"
  loop: "{{ groups['nifi'] | default([]) }}"
  when: inventory_hostname in groups['zookeeper']

- name: Allow ZooKeeper leader/election ports from ZooKeeper nodes
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    src: "{{ hostvars[host]['ansible_host'] }}"
  loop: "{{ zookeeper_ports | default([2888, 3888]) }}"
  loop_control:
    loop_var: item_port
  when: inventory_hostname in groups['zookeeper']
  vars:
    zookeeper_ports: [2888, 3888]

- name: Allow NiFi cluster communication
  ufw:
    rule: allow
    port: "{{ nifi_cluster_node_protocol_port }}"
    proto: tcp
    src: "{{ hostvars[item]['ansible_host'] }}"
  loop: "{{ groups['nifi'] | default([]) }}"
  when: inventory_hostname in groups['nifi']

- name: Allow NiFi HTTPS from HAProxy
  ufw:
    rule: allow
    port: "{{ nifi_web_https_port }}"
    proto: tcp
    src: "{{ hostvars[item]['ansible_host'] }}"
  loop: "{{ groups['haproxy'] | default([]) }}"
  when: inventory_hostname in groups['nifi']

- name: Allow HAProxy stats (restricted)
  ufw:
    rule: allow
    port: "{{ haproxy_stats_port }}"
    proto: tcp
    from_ip: "{{ admin_network | default('127.0.0.1') }}"

- name: Set UFW default policy
  ufw:
    policy: deny
    direction: incoming
    log: yes

- name: Enable UFW
  ufw:
    state: enabled
